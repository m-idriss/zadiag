name: 🔢 Auto bump app version

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-version-bump-main
  cancel-in-progress: true

jobs:
  bump-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          NEW_VERSION=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [major, minor, patch] = String(pkg.version || '0.0.0').split('.').map((v) => Number(v) || 0);
            const next = [major, minor, patch + 1].join('.');
            pkg.version = next;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
            process.stdout.write(next);
          ")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped version to $NEW_VERSION"

      - name: Commit and push version bump
        run: |
          git add package.json
          git commit -m "chore(version): bump to ${{ steps.bump.outputs.version }} [skip ci]"
          git push
